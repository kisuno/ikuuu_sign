name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,   arch: amd64, name: linux-amd64   }
          - { os: ubuntu-24.04-arm, arch: arm64, name: linux-arm64  }
          - { os: macos-latest,    arch: amd64, name: macos-amd64   }
          - { os: macos-latest,    arch: arm64, name: macos-arm64   }
          - { os: windows-latest,  arch: amd64, name: windows-amd64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --console --name "ikuuu_sign-${{ matrix.name }}" --distpath dist src/ikuuu_sign.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List
        run: find dist -type f -ls

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/ikuuu_sign-*
          body_path: CHANGELOG.md
